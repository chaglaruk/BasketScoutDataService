version: "3.9"

services:
  api:
    build: .
    container_name: basketscout-api
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - ENV=production
      - HOST=0.0.0.0
      - PORT=8787
      - DEBUG=false
      - DATABASE_URL=sqlite:///./data/basketscout.db
      - SQLITE_PATH=./data/basketscout.db
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
      - REQUIRE_ADMIN_TOKEN_IN_PRODUCTION=true
      # Set ADMIN_TOKEN from host env before public deployment.
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; r=httpx.get('http://localhost:8787/health'); assert r.json()['ok']"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
