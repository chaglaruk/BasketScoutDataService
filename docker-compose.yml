version: "3.9"

services:
  api:
    build: .
    container_name: basketscout-api
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./data/basketscout.db
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; r=httpx.get('http://localhost:8787/health'); assert r.json()['ok']"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
